<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AP3X — Event Timeline Viewer</title>
  <style>
    :root {
      --bg:      #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
      --border:  #2a2a3a; --cyan: #00e5ff; --green: #00ff88;
      --amber:   #ffb300; --red: #ff3d3d;
      --text:    #e8eaf0; --muted: #6b7280; --dim: #9ca3af;
      --radius:  10px;
      --font:    'Inter', system-ui, sans-serif;
      --mono:    'JetBrains Mono', 'Fira Code', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text);
                 font-family: var(--font); font-size: 14px; line-height: 1.5; overflow: hidden; }

    /* ── LAYOUT ──────────────────────────────────────────────────────── */
    .shell  { display: flex; flex-direction: column; height: 100vh; }
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border);
              padding: 12px 24px; display: flex; align-items: center; gap: 16px;
              flex-shrink: 0; flex-wrap: wrap; }
    .topbar h1 { font-size: 0.95rem; font-weight: 700; color: var(--cyan);
                 letter-spacing: 0.04em; white-space: nowrap; }
    .body   { flex: 1; display: flex; overflow: hidden; }

    /* ── TIMELINE PANEL ──────────────────────────────────────────────── */
    .timeline-panel { flex: 1; overflow-y: auto; padding: 20px 24px;
                      display: flex; flex-direction: column; gap: 0; }

    /* ── DETAIL PANEL ────────────────────────────────────────────────── */
    .detail-panel { width: 360px; flex-shrink: 0; background: var(--surface);
                    border-left: 1px solid var(--border); overflow-y: auto;
                    padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .detail-panel h2 { font-size: 0.78rem; font-weight: 600; color: var(--cyan); }

    /* ── CONTROLS ────────────────────────────────────────────────────── */
    select, input[type="text"] {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 5px 10px;
      font-family: var(--font); font-size: 0.78rem; outline: none; }
    select:focus, input:focus { border-color: var(--cyan); }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px;
           border: none; border-radius: 6px; font-size: 0.78rem; font-weight: 600;
           cursor: pointer; transition: opacity 150ms; }
    .btn-primary { background: var(--cyan); color: #000; }
    .btn-outline { background: transparent; color: var(--dim);
                   border: 1px solid var(--border); }
    .btn-outline:hover, .btn-outline.active { border-color: var(--cyan); color: var(--cyan); }
    .btn:hover { opacity: 0.85; }

    /* ── PLAYBACK BAR ────────────────────────────────────────────────── */
    .playback-bar { background: var(--surface2); border-top: 1px solid var(--border);
                    padding: 10px 24px; display: flex; align-items: center;
                    gap: 14px; flex-shrink: 0; }
    .pb-progress { flex: 1; height: 4px; background: var(--border); border-radius: 2px;
                   overflow: hidden; cursor: pointer; }
    .pb-fill     { height: 100%; background: var(--cyan);
                   border-radius: 2px; transition: width 300ms linear; }
    .pb-counter  { font-family: var(--mono); font-size: 0.75rem; color: var(--muted);
                   min-width: 90px; text-align: right; }

    /* ── TIMELINE ITEMS ──────────────────────────────────────────────── */
    .tl-group { margin-bottom: 28px; }
    .tl-group-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em;
                      color: var(--muted); margin-bottom: 10px; padding-bottom: 6px;
                      border-bottom: 1px solid var(--border); }

    .tl-item { display: flex; gap: 12px; align-items: flex-start;
               padding: 6px 8px; border-radius: 6px; cursor: pointer;
               transition: background 120ms; margin-bottom: 2px; }
    .tl-item:hover   { background: var(--surface2); }
    .tl-item.active  { background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.2); }
    .tl-item.hidden  { display: none; }

    .tl-connector { display: flex; flex-direction: column; align-items: center;
                    flex-shrink: 0; width: 20px; padding-top: 4px; }
    .tl-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .tl-dot.debug    { background: var(--muted); }
    .tl-dot.info     { background: var(--cyan); }
    .tl-dot.warn     { background: var(--amber); }
    .tl-dot.serious  { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
    .tl-dot.critical { background: var(--red);   box-shadow: 0 0 8px var(--red); animation: pulse 1s infinite; }
    .tl-line { flex: 1; width: 1px; background: var(--border); margin: 3px 0; min-height: 16px; }

    .tl-content { flex: 1; min-width: 0; }
    .tl-type    { font-family: var(--mono); font-size: 0.72rem; color: var(--dim); }
    .tl-label   { font-size: 0.8rem; color: var(--text); font-weight: 500; margin: 1px 0; }
    .tl-meta    { font-size: 0.68rem; color: var(--muted); }
    .tl-delta   { font-family: var(--mono); font-size: 0.65rem; color: var(--border);
                  margin-top: 1px; }

    .tl-time    { font-family: var(--mono); font-size: 0.68rem; color: var(--muted);
                  flex-shrink: 0; width: 70px; text-align: right; padding-top: 4px; }

    /* ── PLAYBACK CURSOR ─────────────────────────────────────────────── */
    .tl-item.cursor { background: rgba(0,229,255,0.05);
                      border-left: 2px solid var(--cyan) !important; }

    /* ── DETAIL PANEL CONTENT ────────────────────────────────────────── */
    .detail-field { display: flex; flex-direction: column; gap: 3px; }
    .detail-label { font-size: 0.62rem; color: var(--muted); text-transform: uppercase;
                    letter-spacing: 0.07em; }
    .detail-value { font-family: var(--mono); font-size: 0.75rem; color: var(--text);
                    word-break: break-all; }
    .detail-payload { background: var(--surface2); border: 1px solid var(--border);
                      border-radius: 6px; padding: 10px; font-family: var(--mono);
                      font-size: 0.7rem; color: var(--dim); white-space: pre-wrap;
                      word-break: break-all; max-height: 300px; overflow-y: auto; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px;
             font-size: 0.63rem; font-weight: 700; text-transform: uppercase; }
    .badge-debug    { background: rgba(107,114,128,0.2);  color: var(--muted); }
    .badge-info     { background: rgba(0,229,255,0.12);   color: var(--cyan); }
    .badge-warn     { background: rgba(255,179,0,0.15);   color: var(--amber); }
    .badge-serious  { background: rgba(255,179,0,0.2);    color: var(--amber); }
    .badge-critical { background: rgba(255,61,61,0.18);   color: var(--red); }

    /* ── EMPTY + ANIMATIONS ──────────────────────────────────────────── */
    .empty { padding: 40px; text-align: center; color: var(--muted); font-size: 0.82rem; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
<div class="shell">

  <!-- ── TOPBAR ─────────────────────────────────────────────────────────── -->
  <div class="topbar">
    <h1>⏱ Event Timeline Viewer</h1>

    <select id="tl-fleet"><option value="">All Fleets</option></select>
    <select id="tl-driver"><option value="">All Drivers</option></select>
    <select id="tl-window">
      <option value="3600000">Last 1h</option>
      <option value="86400000" selected>Last 24h</option>
      <option value="604800000">Last 7d</option>
    </select>
    <input type="text" id="tl-type-filter" placeholder="Filter type (e.g. tacho)" style="width:150px" />

    <!-- Severity toggles -->
    <div style="display:flex;gap:4px">
      <button class="btn btn-outline active" data-sev="debug">Debug</button>
      <button class="btn btn-outline active" data-sev="info">Info</button>
      <button class="btn btn-outline active" data-sev="warn">Warn</button>
      <button class="btn btn-outline active" data-sev="serious">Serious</button>
      <button class="btn btn-outline active" data-sev="critical">Critical</button>
    </div>

    <button class="btn btn-primary" id="tl-btn-load">Load</button>

    <!-- Bucket -->
    <select id="tl-bucket">
      <option value="hour">By hour</option>
      <option value="day">By day</option>
    </select>

    <span id="tl-count" style="color:var(--muted);font-size:0.75rem;margin-left:8px">—</span>
  </div>

  <!-- ── BODY ───────────────────────────────────────────────────────────── -->
  <div class="body">

    <!-- Timeline -->
    <div class="timeline-panel" id="timeline-panel">
      <div class="empty">
        <div style="font-size:2rem;margin-bottom:8px">⏱</div>
        Select filters and click Load to render the event timeline.
      </div>
    </div>

    <!-- Detail -->
    <div class="detail-panel" id="detail-panel">
      <h2>Event Detail</h2>
      <div style="color:var(--muted);font-size:0.78rem">Select an event to inspect</div>
    </div>

  </div>

  <!-- ── PLAYBACK BAR ───────────────────────────────────────────────────── -->
  <div class="playback-bar">
    <button class="btn btn-outline" id="pb-rewind" title="Rewind">⏮</button>
    <button class="btn btn-primary" id="pb-play" title="Play">▶ Play</button>
    <button class="btn btn-outline" id="pb-pause" title="Pause" style="display:none">⏸ Pause</button>
    <button class="btn btn-outline" id="pb-forward" title="Step forward">⏭</button>
    <div class="pb-progress" id="pb-track"><div class="pb-fill" id="pb-fill" style="width:0%"></div></div>
    <select id="pb-speed" style="width:80px">
      <option value="1000">1×</option>
      <option value="500">2×</option>
      <option value="200">5×</option>
      <option value="50">20×</option>
    </select>
    <span class="pb-counter" id="pb-counter">— / —</span>
  </div>

</div>

<script type="module">
import { replayEvents, buildTimeline, classifyEvent } from "../core/observability/event-log.js";

const store  = window.AP3X_STORE || { events: [], fleets: {}, drivers: {} };
const events = store.events || [];

// ─── STATE ────────────────────────────────────────────────────────────────────
let _replay     = null;   // ReplayResult
let _cursor     = -1;     // current playback index
let _playing    = false;
let _playTimer  = null;
let _activeSev  = new Set(["debug","info","warn","serious","critical"]);

// ─── POPULATE SELECTS ────────────────────────────────────────────────────────
Object.values(store.fleets  || {}).forEach(f => _addOpt("tl-fleet",  f.id, f.name || f.id));
Object.values(store.drivers || {}).forEach(d => _addOpt("tl-driver", d.id, d.name || d.id));

// ─── SEVERITY TOGGLES ────────────────────────────────────────────────────────
document.querySelectorAll("[data-sev]").forEach(btn => {
  btn.addEventListener("click", () => {
    const sev = btn.dataset.sev;
    if (_activeSev.has(sev)) { _activeSev.delete(sev); btn.classList.remove("active"); }
    else                     { _activeSev.add(sev);    btn.classList.add("active"); }
    _applyFilters();
  });
});

// ─── LOAD ─────────────────────────────────────────────────────────────────────
document.getElementById("tl-btn-load").addEventListener("click", _load);

function _load() {
  const window_ = parseInt(document.getElementById("tl-window").value);
  const fleetId = document.getElementById("tl-fleet").value  || null;
  const driverId= document.getElementById("tl-driver").value || null;
  const typeQ   = document.getElementById("tl-type-filter").value.trim().toLowerCase();

  _replay  = replayEvents(events, {
    sinceMs:  Date.now() - window_,
    fleetId,
    driverId,
    types:    typeQ ? null : null,    // prefix filter applied in render
    maxEvents:500
  });

  // Apply prefix filter client-side
  if (typeQ) {
    _replay.events = _replay.events.filter(e => e.type?.toLowerCase().includes(typeQ));
    _replay.total  = _replay.events.length;
  }

  _cursor = -1;
  _renderTimeline();
  _updatePlayback();
  document.getElementById("tl-count").textContent = `${_replay.total} events`;
}

// ─── RENDER TIMELINE ──────────────────────────────────────────────────────────
function _renderTimeline() {
  const panel  = document.getElementById("timeline-panel");
  const bucket = document.getElementById("tl-bucket").value;

  if (!_replay || !_replay.total) {
    panel.innerHTML = `<div class="empty"><div style="font-size:2rem">📭</div>No events in selected window.</div>`;
    return;
  }

  // Group by bucket
  const groups = new Map();
  for (const e of _replay.events) {
    const key   = _bucketKey(e.timestamp, bucket);
    const label = _bucketLabel(e.timestamp, bucket);
    if (!groups.has(key)) groups.set(key, { label, events: [] });
    groups.get(key).events.push(e);
  }

  let html = "";
  for (const [, group] of groups) {
    html += `<div class="tl-group"><div class="tl-group-label">${group.label}</div>`;
    group.events.forEach((e, localIdx) => {
      const isLast = localIdx === group.events.length - 1;
      html += `
        <div class="tl-item" data-idx="${e.replayIndex}"
             data-sev="${e.severity}" style="">
          <div class="tl-time">${_fmtTime(e.timestamp)}</div>
          <div class="tl-connector">
            <div class="tl-dot ${e.severity}"></div>
            ${!isLast ? '<div class="tl-line"></div>' : ''}
          </div>
          <div class="tl-content">
            <div class="tl-type">${e.type}</div>
            <div class="tl-label">${e.label}</div>
            <div class="tl-meta">${e.domain} · ${e.fleetId || ""} ${e.entityId ? "· " + e.entityId : ""}</div>
            ${e.deltaMs > 0 ? `<div class="tl-delta">${e.deltaLabel}</div>` : ""}
          </div>
          <span class="badge badge-${e.severity}" style="flex-shrink:0;margin-top:4px">${e.severity}</span>
        </div>`;
    });
    html += `</div>`;
  }

  panel.innerHTML = html;

  // Click to inspect
  panel.querySelectorAll(".tl-item").forEach(item => {
    item.addEventListener("click", () => {
      const idx = parseInt(item.dataset.idx);
      _cursor = idx;
      _selectItem(idx);
    });
  });

  _applyFilters();
}

// ─── FILTER (severity toggles, type prefix) ───────────────────────────────────
function _applyFilters() {
  document.querySelectorAll(".tl-item[data-sev]").forEach(item => {
    item.classList.toggle("hidden", !_activeSev.has(item.dataset.sev));
  });
}

// ─── SELECT ITEM ──────────────────────────────────────────────────────────────
function _selectItem(idx) {
  if (!_replay || idx < 0 || idx >= _replay.events.length) return;
  const e = _replay.events[idx];

  // Highlight
  document.querySelectorAll(".tl-item").forEach(el => el.classList.remove("active", "cursor"));
  const el = document.querySelector(`.tl-item[data-idx="${idx}"]`);
  if (el) {
    el.classList.add("active");
    el.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  // Detail panel
  const detail = document.getElementById("detail-panel");
  detail.innerHTML = `
    <h2>Event Detail</h2>
    <div class="detail-field">
      <div class="detail-label">Type</div>
      <div class="detail-value" style="color:var(--cyan)">${e.type}</div>
    </div>
    <div class="detail-field">
      <div class="detail-label">Label</div>
      <div class="detail-value">${e.label}</div>
    </div>
    <div class="detail-field">
      <div class="detail-label">Severity</div>
      <span class="badge badge-${e.severity}">${e.severity}</span>
    </div>
    <div class="detail-field">
      <div class="detail-label">Time</div>
      <div class="detail-value">${new Date(e.timestamp).toLocaleString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit",day:"numeric",month:"short",year:"numeric"})}</div>
    </div>
    <div class="detail-field">
      <div class="detail-label">ISO</div>
      <div class="detail-value">${e.isoTime}</div>
    </div>
    ${e.fleetId  ? `<div class="detail-field"><div class="detail-label">Fleet</div><div class="detail-value">${e.fleetId}</div></div>` : ""}
    ${e.entityId ? `<div class="detail-field"><div class="detail-label">Entity</div><div class="detail-value">${e.entityId}</div></div>` : ""}
    <div class="detail-field">
      <div class="detail-label">Domain</div>
      <div class="detail-value">${e.domain}</div>
    </div>
    <div class="detail-field">
      <div class="detail-label">Category</div>
      <div class="detail-value">${e.category}</div>
    </div>
    ${idx > 0 ? `<div class="detail-field"><div class="detail-label">Since prev event</div><div class="detail-value">${e.deltaLabel}</div></div>` : ""}
    <div class="detail-field">
      <div class="detail-label">Replay index</div>
      <div class="detail-value">${idx + 1} / ${_replay.total}</div>
    </div>
    <div class="detail-field">
      <div class="detail-label">Payload</div>
      <pre class="detail-payload">${JSON.stringify(e.payload || {}, null, 2)}</pre>
    </div>
  `;

  _updatePlayback();
}

// ─── PLAYBACK ─────────────────────────────────────────────────────────────────
document.getElementById("pb-play").addEventListener("click",    _startPlay);
document.getElementById("pb-pause").addEventListener("click",   _pausePlay);
document.getElementById("pb-rewind").addEventListener("click",  () => { _pausePlay(); _cursor = -1; _selectItem(0); });
document.getElementById("pb-forward").addEventListener("click", () => { if (_cursor < (_replay?.total || 1) - 1) _selectItem(++_cursor); });

function _startPlay() {
  if (!_replay?.total) return;
  if (_cursor < 0) _cursor = 0;
  _playing = true;
  document.getElementById("pb-play").style.display  = "none";
  document.getElementById("pb-pause").style.display = "";
  _tick();
}

function _pausePlay() {
  _playing = false;
  clearTimeout(_playTimer);
  document.getElementById("pb-play").style.display  = "";
  document.getElementById("pb-pause").style.display = "none";
}

function _tick() {
  if (!_playing || !_replay) return;
  if (_cursor >= _replay.total - 1) { _pausePlay(); return; }
  _selectItem(++_cursor);
  const speed = parseInt(document.getElementById("pb-speed").value);
  _playTimer = setTimeout(_tick, speed);
}

function _updatePlayback() {
  if (!_replay?.total) return;
  const pct = _replay.total > 1 ? (Math.max(0,_cursor) / (_replay.total - 1)) * 100 : 0;
  document.getElementById("pb-fill").style.width    = `${pct.toFixed(1)}%`;
  document.getElementById("pb-counter").textContent = `${Math.max(0,_cursor)+1} / ${_replay.total}`;
}

// Progress bar scrub
document.getElementById("pb-track").addEventListener("click", (e) => {
  if (!_replay?.total) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct  = (e.clientX - rect.left) / rect.width;
  _cursor    = Math.round(pct * (_replay.total - 1));
  _selectItem(_cursor);
});

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function _addOpt(id, value, label) {
  const sel = document.getElementById(id);
  if (!sel) return;
  const opt = document.createElement("option");
  opt.value = value; opt.textContent = label;
  sel.appendChild(opt);
}

function _bucketKey(ts, bucket) {
  const d = new Date(ts);
  return bucket === "day"
    ? `${d.getUTCFullYear()}-${d.getUTCMonth()}-${d.getUTCDate()}`
    : `${d.getUTCFullYear()}-${d.getUTCMonth()}-${d.getUTCDate()}-${d.getUTCHours()}`;
}

function _bucketLabel(ts, bucket) {
  const d = new Date(ts);
  return bucket === "day"
    ? d.toLocaleDateString("en-GB", { weekday:"short", day:"numeric", month:"short" })
    : d.toLocaleString("en-GB", { day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" });
}

function _fmtTime(ts) {
  return new Date(ts).toLocaleTimeString("en-GB", { hour:"2-digit", minute:"2-digit", second:"2-digit" });
}
</script>
</body>
</html>
